services:
  postgres:
    image: postgres:16-alpine
    container_name: bolao-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-bolao}
      POSTGRES_USER: ${DB_USERNAME:-bolao}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bolao}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-bolao}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: bolao-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: bolao-postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-bolao}
      DB_USERNAME: ${DB_USERNAME:-bolao}
      DB_PASSWORD: ${DB_PASSWORD:-bolao}
      PORT: 8080
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      BOLAO_SUBTITLE: ${BOLAO_SUBTITLE:-Câmara dos Lordes}
      BOLAO_PAYMENT_AMOUNT: ${BOLAO_PAYMENT_AMOUNT:-R$ 150}
      BOLAO_PAYMENT_KEY: ${BOLAO_PAYMENT_KEY:-c2297554-7770-4a72-8b6f-b5ee46d3473a}
      BOLAO_CONTACT_URL: ${BOLAO_CONTACT_URL:-https://wa.me/56963891924}
      BOLAO_CONTACT_LABEL: ${BOLAO_CONTACT_LABEL:-Falar com o Rodrigo}
      BOLAO_PAYMENT_AMOUNT_VALUE: ${BOLAO_PAYMENT_AMOUNT_VALUE:-150}
      BOLAO_CURRENCY_SYMBOL: ${BOLAO_CURRENCY_SYMBOL:-R$}
      BOLAO_HOSTING_COST: ${BOLAO_HOSTING_COST:-50}
      BOLAO_FINGERPRINT_ENABLED: ${BOLAO_FINGERPRINT_ENABLED:-false}
    ports:
      - "${APP_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  postgres_data:
