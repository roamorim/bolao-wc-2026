services:
  postgres:
    ports: !reset []

  app:
    image: ghcr.io/${GHCR_USER}/bolao-wc-2026:latest
    build: !reset null
    restart: always
    ports: !reset []

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/bolao/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/ssl/bolao:/etc/ssl/bolao:ro
    depends_on:
      - app
    restart: always
