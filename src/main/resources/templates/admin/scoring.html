<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Admin - Pontuação')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container py-4" style="max-width: 700px">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-sliders"></i> Configuração de Pontuação</h4>
        <div>
            <a th:href="@{/admin/matches}" class="btn btn-outline-secondary btn-sm">Jogos</a>
        </div>
    </div>

    <div class="alert alert-warning">
        <i class="bi bi-exclamation-triangle"></i>
        Alterar pontos e depois clicar em <strong>Recalcular tudo</strong> recalcula todos os jogos já encerrados.
    </div>

    <div class="card shadow-sm mb-4">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Categoria</th>
                        <th class="text-center" style="width:130px">Pontos</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                <tr th:each="config : ${configs}">
                    <td>
                        <span th:text="${config.description}">Descrição</span>
                        <small class="d-block text-muted font-monospace" th:text="${config.configKey}">KEY</small>
                    </td>
                    <td>
                        <form th:action="@{/admin/scoring/{id}(id=${config.id})}" method="post"
                              class="d-flex gap-2 justify-content-center">
                            <input type="number" name="points" th:value="${config.points}"
                                   class="form-control form-control-sm text-center" style="width:80px"
                                   min="0" max="100" required/>
                            <button type="submit" class="btn btn-sm btn-outline-success">
                                <i class="bi bi-save"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <form th:action="@{/admin/scoring/recalculate}" method="post">
        <button type="submit" class="btn btn-danger"
                onclick="return confirm('Recalcular todos os pontos com a configuração atual?')">
            <i class="bi bi-arrow-repeat"></i> Recalcular tudo
        </button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
