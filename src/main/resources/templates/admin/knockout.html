<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Admin - Mata-mata')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-diagram-3"></i> Mata-mata</h4>
        <a th:href="@{/admin/matches}" class="text-muted small">← Admin</a>
    </div>

    <!-- Bracket assembly status -->
    <div class="card mb-4">
        <div class="card-body d-flex align-items-center gap-3">
            <div>
                <span th:if="${allGroupResultsIn}" class="badge bg-success fs-6">
                    <i class="bi bi-check-circle-fill"></i> 12/12 grupos registrados
                </span>
                <span th:unless="${allGroupResultsIn}" class="badge bg-warning text-dark fs-6">
                    <i class="bi bi-hourglass-split"></i> Aguardando resultados dos grupos
                </span>
            </div>
            <form th:action="@{/admin/knockout/assemble}" method="post" class="ms-auto">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit"
                        class="btn btn-primary"
                        th:disabled="${!allGroupResultsIn or bracketReady}"
                        onclick="return confirm('Montar o bracket do R32 com os classificados dos grupos?')">
                    <i class="bi bi-diagram-3-fill me-1"></i>
                    <span th:if="${bracketReady}">Bracket já montado</span>
                    <span th:unless="${bracketReady}">Montar Bracket R32</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Knockout stages -->
    <div th:each="sg : ${stageGroups}" class="mb-5">
        <h5 class="fw-bold mb-3 border-bottom pb-2" th:text="${sg.stage.name}">Fase</h5>

        <div class="card shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th class="text-muted" style="width:50px">#</th>
                            <th>Jogo</th>
                            <th class="text-center" style="width:120px">Data (UTC)</th>
                            <th class="text-center" style="width:120px">Resultado</th>
                            <th style="width:130px"></th>
                        </tr>
                    </thead>
                    <tbody>
                    <tr th:each="match : ${sg.matches}">
                        <td class="text-muted small" th:text="${match.matchNumber}">73</td>
                        <td>
                            <span th:if="${match.homeTeam != null}"
                                  class="fw-semibold" th:text="${match.homeTeam.name}">Casa</span>
                            <span th:unless="${match.homeTeam != null}"
                                  class="text-muted fst-italic">A definir</span>
                            <span class="text-muted mx-1">×</span>
                            <span th:if="${match.awayTeam != null}"
                                  class="fw-semibold" th:text="${match.awayTeam.name}">Fora</span>
                            <span th:unless="${match.awayTeam != null}"
                                  class="text-muted fst-italic">A definir</span>
                        </td>
                        <td class="text-center small"
                            th:text="${#temporals.format(match.matchDatetime, 'dd/MM HH:mm')}">-</td>
                        <td class="text-center fw-bold">
                            <span th:if="${match.finished}"
                                  th:text="${match.homeScore} + ' × ' + ${match.awayScore}">- × -</span>
                            <span th:unless="${match.finished}" class="text-muted">—</span>
                        </td>
                        <td class="text-end">
                            <button th:if="${match.homeTeam != null and match.awayTeam != null and !match.finished}"
                                    class="btn btn-sm btn-success"
                                    data-bs-toggle="modal"
                                    th:data-bs-target="${'#resultModal-' + match.id}">
                                <i class="bi bi-check-circle me-1"></i>Resultado
                            </button>
                            <span th:if="${match.homeTeam == null or match.awayTeam == null}"
                                  class="text-muted small fst-italic">Aguardando times</span>

                            <!-- Result Modal -->
                            <div th:if="${match.homeTeam != null and match.awayTeam != null and !match.finished}"
                                 class="modal fade"
                                 th:id="${'resultModal-' + match.id}"
                                 tabindex="-1">
                                <div class="modal-dialog modal-sm">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <h6 class="modal-title">
                                                <span th:text="${match.homeTeam.name}"></span>
                                                ×
                                                <span th:text="${match.awayTeam.name}"></span>
                                            </h6>
                                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                        </div>
                                        <form th:action="@{/admin/knockout/{id}/result(id=${match.id})}" method="post">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <div class="modal-body">
                                                <div class="d-flex align-items-center gap-2 justify-content-center">
                                                    <div class="text-center">
                                                        <label class="form-label small" th:text="${match.homeTeam.name}"></label>
                                                        <input type="number" name="homeScore"
                                                               class="form-control form-control-lg text-center"
                                                               style="width:70px" min="0" max="20" value="0" required/>
                                                    </div>
                                                    <span class="fw-bold mt-3">×</span>
                                                    <div class="text-center">
                                                        <label class="form-label small" th:text="${match.awayTeam.name}"></label>
                                                        <input type="number" name="awayScore"
                                                               class="form-control form-control-lg text-center"
                                                               style="width:70px" min="0" max="20" value="0" required/>
                                                    </div>
                                                </div>
                                                <p class="text-muted small mt-2 mb-0 text-center">
                                                    Resultado dos 90 min. (sem prorrogação)
                                                </p>
                                            </div>
                                            <div class="modal-footer">
                                                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                                                <button type="submit" class="btn btn-success btn-sm">Confirmar</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
