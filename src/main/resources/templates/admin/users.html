<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Admin - Usuários')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-people"></i> Gerenciar Usuários</h4>
        <div>
            <a th:href="@{/admin/matches}" class="btn btn-outline-secondary btn-sm me-2">Jogos</a>
            <a th:href="@{/admin/scoring}" class="btn btn-outline-secondary btn-sm">Pontuação</a>
        </div>
    </div>

    <div class="row g-4">
        <!-- Criar usuário -->
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header fw-bold">Novo Participante</div>
                <div class="card-body">
                    <form th:action="@{/admin/users}" method="post" th:object="${createRequest}">
                        <div class="mb-2">
                            <label class="form-label small">Username</label>
                            <input type="text" th:field="*{username}" class="form-control form-control-sm"
                                   placeholder="joao_silva" required/>
                            <div th:if="${#fields.hasErrors('username')}" class="text-danger small"
                                 th:errors="*{username}"></div>
                        </div>
                        <div class="mb-2">
                            <label class="form-label small">Nome de exibição</label>
                            <input type="text" th:field="*{displayName}" class="form-control form-control-sm"
                                   placeholder="João Silva" required/>
                        </div>
                        <div class="mb-2">
                            <label class="form-label small">Email</label>
                            <input type="email" th:field="*{email}" class="form-control form-control-sm"
                                   placeholder="joao@email.com" required/>
                        </div>
                        <div class="mb-2">
                            <label class="form-label small">Senha inicial</label>
                            <input type="password" th:field="*{password}" class="form-control form-control-sm"
                                   placeholder="mínimo 6 caracteres" required/>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" th:field="*{admin}" class="form-check-input" id="isAdmin"/>
                            <label class="form-check-label small" for="isAdmin">Administrador</label>
                        </div>
                        <button type="submit" class="btn btn-success btn-sm w-100">
                            <i class="bi bi-person-plus"></i> Criar usuário
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Lista de usuários -->
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>Username</th>
                                <th>Nome</th>
                                <th>Email</th>
                                <th class="text-center">Role</th>
                                <th class="text-center">Ativo</th>
                                <th>Apostas</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                        <tr th:each="u : ${users}"
                            th:classappend="${!u.active} ? 'text-muted' : ''">
                            <td th:text="${u.username}">username</td>
                            <td th:text="${u.displayName}">Nome</td>
                            <td class="small" th:text="${u.email}">email</td>
                            <td class="text-center">
                                <span th:if="${u.role.name() == 'ADMIN'}" class="badge bg-danger">Admin</span>
                                <span th:unless="${u.role.name() == 'ADMIN'}" class="badge bg-secondary">User</span>
                            </td>
                            <td class="text-center">
                                <i th:if="${u.active}" class="bi bi-check-circle-fill text-success"></i>
                                <i th:unless="${u.active}" class="bi bi-x-circle-fill text-danger"></i>
                            </td>
                            <td th:with="ps=${picksStatus[u.id]}" class="small">
                                <div>
                                    <span class="badge bg-secondary"
                                          th:text="${(ps != null ? ps.matchPicksCount : 0) + '/' + totalGroupMatches + ' jogos'}">0/48 jogos</span>
                                </div>
                                <div>
                                    <span class="badge bg-secondary"
                                          th:text="${(ps != null ? ps.groupClassPicksCount : 0) + '/12 grupos'}">0/12 grupos</span>
                                </div>
                                <div class="mt-1">
                                    <span th:class="${'badge me-1 ' + (ps != null and ps.hasSemifinalists ? 'bg-success' : 'bg-secondary bg-opacity-25 text-secondary')}">Semi</span>
                                    <span th:class="${'badge ' + (ps != null and ps.hasTopScorer ? 'bg-success' : 'bg-secondary bg-opacity-25 text-secondary')}">Art.</span>
                                </div>
                            </td>
                            <td>
                                <!-- Toggle ativo -->
                                <form th:action="@{/admin/users/{id}/toggle-active(id=${u.id})}"
                                      method="post" class="d-inline">
                                    <button class="btn btn-sm btn-outline-warning"
                                            th:text="${u.active} ? 'Desativar' : 'Ativar'">Ativar</button>
                                </form>

                                <!-- Editar -->
                                <button class="btn btn-sm btn-outline-primary"
                                        data-bs-toggle="modal"
                                        th:data-bs-target="${'#editModal-' + u.id}"
                                        title="Editar">
                                    <i class="bi bi-pencil"></i>
                                </button>

                                <!-- Redefinir senha -->
                                <button class="btn btn-sm btn-outline-secondary"
                                        data-bs-toggle="modal"
                                        th:data-bs-target="${'#resetPwdModal-' + u.id}"
                                        title="Redefinir senha">
                                    <i class="bi bi-key"></i>
                                </button>

                                <!-- Excluir -->
                                <form th:action="@{/admin/users/{id}/delete(id=${u.id})}"
                                      method="post" class="d-inline"
                                      th:attr="data-name=${u.username}"
                                      onsubmit="return confirm('Excluir ' + this.dataset.name + ' e todas as apostas dele?')">
                                    <button class="btn btn-sm btn-outline-danger" title="Excluir">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>

                                <!-- Modal editar -->
                                <div class="modal fade" th:id="${'editModal-' + u.id}" tabindex="-1">
                                    <div class="modal-dialog">
                                        <div class="modal-content">
                                            <div class="modal-header">
                                                <h6 class="modal-title">Editar — <span th:text="${u.username}"></span></h6>
                                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                            </div>
                                            <form th:action="@{/admin/users/{id}/edit(id=${u.id})}" method="post">
                                                <div class="modal-body">
                                                    <div class="mb-2">
                                                        <label class="form-label small">Nome de exibição</label>
                                                        <input type="text" name="displayName" class="form-control form-control-sm"
                                                               th:value="${u.displayName}" required/>
                                                    </div>
                                                    <div class="mb-2">
                                                        <label class="form-label small">Email</label>
                                                        <input type="email" name="email" class="form-control form-control-sm"
                                                               th:value="${u.email}" required/>
                                                    </div>
                                                    <div class="form-check">
                                                        <input type="checkbox" name="admin" value="true"
                                                               class="form-check-input"
                                                               th:id="${'isAdmin-' + u.id}"
                                                               th:checked="${u.role.name() == 'ADMIN'}"/>
                                                        <label class="form-check-label small"
                                                               th:for="${'isAdmin-' + u.id}">Administrador</label>
                                                    </div>
                                                </div>
                                                <div class="modal-footer">
                                                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                                                    <button type="submit" class="btn btn-primary btn-sm">Salvar</button>
                                                </div>
                                            </form>
                                        </div>
                                    </div>
                                </div>

                                <!-- Modal redefinir senha -->
                                <div class="modal fade" th:id="${'resetPwdModal-' + u.id}" tabindex="-1">
                                    <div class="modal-dialog modal-sm">
                                        <div class="modal-content">
                                            <div class="modal-header">
                                                <h6 class="modal-title">Redefinir senha — <span th:text="${u.username}"></span></h6>
                                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                            </div>
                                            <form th:action="@{/admin/users/{id}/reset-password(id=${u.id})}" method="post">
                                                <div class="modal-body">
                                                    <input type="password" name="newPassword" class="form-control"
                                                           placeholder="Nova senha (mín. 6)" required minlength="6"/>
                                                </div>
                                                <div class="modal-footer">
                                                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                                                    <button type="submit" class="btn btn-warning btn-sm">Redefinir</button>
                                                </div>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
