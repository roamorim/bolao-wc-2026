<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Ranking')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container py-4">
    <h4 class="fw-bold mb-4"><i class="bi bi-trophy"></i> Ranking Geral</h4>

    <div class="card shadow-sm"
         hx-get="/leaderboard/fragment"
         hx-trigger="every 60s"
         hx-target="#leaderboard-body">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-success">
                    <tr>
                        <th class="text-center">#</th>
                        <th>Participante</th>
                        <th class="text-center">Total</th>
                        <th class="text-center">Jogos</th>
                        <th class="text-center">Grupos</th>
                        <th class="text-center">Semi</th>
                        <th class="text-center">Artilheiro</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body" th:fragment="leaderboardTable">
                    <tr th:each="entry, stat : ${entries}"
                        th:classappend="${stat.index == 0} ? 'table-warning fw-bold' : (${stat.index == 1} ? 'table-light' : '')">
                        <td class="text-center">
                            <span th:if="${stat.index == 0}">🥇</span>
                            <span th:if="${stat.index == 1}">🥈</span>
                            <span th:if="${stat.index == 2}">🥉</span>
                            <span th:if="${stat.index > 2}" th:text="${stat.count}"></span>
                        </td>
                        <td th:text="${entry.displayName}">Nome</td>
                        <td class="text-center fw-bold text-success" th:text="${entry.totalPoints}">0</td>
                        <td class="text-center text-muted" th:text="${entry.matchPoints}">0</td>
                        <td class="text-center text-muted" th:text="${entry.groupPoints}">0</td>
                        <td class="text-center text-muted" th:text="${entry.semifinalistsPoints}">0</td>
                        <td class="text-center text-muted" th:text="${entry.topScorerPoints}">0</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
