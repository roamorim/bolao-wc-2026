<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<body>
<!--
    Fragment groupCard
    Variáveis esperadas no contexto:
      groupName      : String (ex: "A")
      teams          : List<Team>
      pred           : GroupClassificationPrediction | null
      deadline       : Instant
      deadlinePassed : boolean
      groupError     : String | null (opcional)
-->
<div th:fragment="groupCard(groupName, pred, teams, deadline, deadlinePassed)"
     th:id="'group-card-' + ${groupName}"
     class="card h-100"
     th:classappend="${pred != null ? ' border-success' : ''}">

    <div class="card-header d-flex justify-content-between align-items-center py-2"
         th:classappend="${pred != null ? ' bg-success text-white' : ' bg-light'}">
        <span class="fw-bold">Grupo <span th:text="${groupName}"></span></span>
        <span th:if="${pred != null}" class="badge bg-white text-success">
            <i class="bi bi-check-circle-fill"></i> Salvo
        </span>
    </div>

    <div class="card-body p-3">
        <div th:if="${groupError}" class="alert alert-danger py-1 mb-2 small" th:text="${groupError}"></div>

        <form th:action="@{/special-predictions/group/{g}(g=${groupName})}"
              method="post"
              th:attr="hx-post=@{/special-predictions/group/{g}(g=${groupName})},hx-target='#group-card-' + ${groupName}"
              hx-swap="outerHTML">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- 1º lugar -->
            <div class="mb-2">
                <label class="form-label small mb-1 text-muted">1º lugar</label>
                <select name="firstTeamId" class="form-select form-select-sm"
                        th:disabled="${deadlinePassed}" required>
                    <option value="">Selecione...</option>
                    <option th:each="team : ${teams}"
                            th:value="${team.id}"
                            th:text="${team.name}"
                            th:selected="${pred != null and pred.firstPlaceTeam?.id == team.id}"></option>
                </select>
            </div>

            <!-- 2º lugar -->
            <div class="mb-2">
                <label class="form-label small mb-1 text-muted">2º lugar</label>
                <select name="secondTeamId" class="form-select form-select-sm"
                        th:disabled="${deadlinePassed}" required>
                    <option value="">Selecione...</option>
                    <option th:each="team : ${teams}"
                            th:value="${team.id}"
                            th:text="${team.name}"
                            th:selected="${pred != null and pred.secondPlaceTeam?.id == team.id}"></option>
                </select>
            </div>

            <!-- 3º lugar + avança -->
            <div class="mb-2">
                <label class="form-label small mb-1 text-muted">3º lugar</label>
                <div class="d-flex align-items-center gap-2">
                    <select name="thirdTeamId" class="form-select form-select-sm"
                            th:disabled="${deadlinePassed}">
                        <option value="">Selecione...</option>
                        <option th:each="team : ${teams}"
                                th:value="${team.id}"
                                th:text="${team.name}"
                                th:selected="${pred != null and pred.thirdPlaceTeam?.id == team.id}"></option>
                    </select>
                    <div class="form-check form-switch mb-0 flex-shrink-0"
                         title="Este 3º avança para o mata-mata?">
                        <input class="form-check-input" type="checkbox"
                               name="thirdQualifies" value="true"
                               th:disabled="${deadlinePassed}"
                               th:checked="${pred != null and pred.thirdQualifies}"
                               th:id="'thirdQualifies-' + ${groupName}"/>
                        <label class="form-check-label small"
                               th:for="'thirdQualifies-' + ${groupName}">Avança</label>
                    </div>
                </div>
            </div>

            <div class="mt-3">
                <button type="submit" class="btn btn-success btn-sm w-100"
                        th:disabled="${deadlinePassed}">
                    <i class="bi bi-floppy me-1"></i>
                    Salvar Grupo <span th:text="${groupName}"></span>
                </button>
            </div>
        </form>
    </div>

    <div th:if="${pred != null}" class="card-footer py-1 text-muted small">
        Salvo em
        <span class="local-time"
              th:data-ms="${pred.submittedAt.toEpochMilli()}"
              th:text="${#temporals.format(pred.submittedAt, 'dd/MM HH:mm')}"></span>
        <span th:if="${pred.pointsEarned != null}" class="ms-2">
            · <span class="badge"
                    th:classappend="${pred.pointsEarned > 0 ? 'bg-success' : 'bg-light text-dark border'}"
                    th:text="${pred.pointsEarned} + ' pts'"></span>
        </span>
    </div>
</div>
</body>
</html>
