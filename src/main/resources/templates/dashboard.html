<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container py-4">
    <div class="row g-4">

        <!-- Chamada pro mata-mata -->
        <div class="col-lg-8">
            <div class="card border-success h-100">
                <div class="card-body text-center py-5">
                    <i class="bi bi-trophy-fill text-success" style="font-size:3rem"></i>
                    <h4 class="fw-bold mt-3">Mata-mata</h4>

                    <div th:if="${bracketReady && bracketDeadlinePassed}">
                        <p class="text-muted">
                            Apostas encerradas. Você apostou
                            <strong th:text="${myBracketPicks}">0</strong> de
                            <strong th:text="${totalBracketMatches}">32</strong> jogos do mata-mata.
                        </p>
                        <a th:href="@{/bracket}" class="btn btn-outline-success">
                            <i class="bi bi-diagram-3 me-1"></i> Ver chave e palpites de todos
                        </a>
                    </div>
                    <div th:if="${bracketReady && !bracketDeadlinePassed}">
                        <p class="text-muted">
                            Você já apostou
                            <strong th:text="${myBracketPicks}">0</strong> de
                            <strong th:text="${totalBracketMatches}">32</strong> jogos do mata-mata.
                        </p>
                        <a th:href="@{/bracket}" class="btn btn-success btn-lg">
                            <i class="bi bi-diagram-3 me-1"></i>
                            <span th:text="${myBracketPicks >= totalBracketMatches} ? 'Ver meus palpites' : 'Apostar agora'">Apostar agora</span>
                        </a>
                    </div>
                    <div th:unless="${bracketReady}">
                        <p class="text-muted">As chaves do mata-mata ainda estão sendo montadas. Fique de olho!</p>
                        <a th:href="@{/bracket}" class="btn btn-outline-success">
                            <i class="bi bi-diagram-3 me-1"></i> Ver mata-mata
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Ranking resumido -->
        <div class="col-lg-4">
            <h5 class="fw-bold mb-3"><i class="bi bi-trophy"></i> Ranking</h5>
            <div class="card">
                <div class="table-responsive">
                    <table class="table table-sm mb-0">
                        <tbody>
                        <tr th:each="entry, stat : ${leaderboard}"
                            th:classappend="${entry.displayName == user.displayName} ? 'table-success fw-bold' : ''">
                            <td class="text-center" th:text="${stat.count}">1</td>
                            <td th:text="${entry.displayName}">Nome</td>
                            <td class="text-end fw-bold" th:text="${entry.totalPoints}">0</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="card-footer text-center">
                    <a th:href="@{/leaderboard}" class="btn btn-sm btn-outline-success">Ver ranking completo</a>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
