<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container py-4">
    <div class="row g-4">

        <!-- Próximos jogos -->
        <div class="col-lg-8">
            <h5 class="fw-bold mb-3"><i class="bi bi-calendar3"></i> Próximos Jogos (7 dias)</h5>
            <div th:if="${#lists.isEmpty(upcomingMatches)}" class="text-muted">
                Nenhum jogo nos próximos 7 dias.
            </div>
            <div class="list-group" th:unless="${#lists.isEmpty(upcomingMatches)}">
                <a th:each="match : ${upcomingMatches}"
                   th:href="@{/matches/{id}(id=${match.id})}"
                   class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                    <div>
                        <span class="fw-semibold"
                              th:text="${match.homeTeam?.name} + ' x ' + ${match.awayTeam?.name}">Time A x Time B</span>
                        <small class="d-block text-muted"
                               th:text="${#temporals.format(match.matchDatetime, 'dd/MM HH:mm')} + ' UTC'">data</small>
                    </div>
                    <div>
                        <span th:if="${match.open}" class="badge bg-success">Apostas abertas</span>
                        <span th:unless="${match.open}" class="badge bg-secondary">Encerrado</span>
                    </div>
                </a>
            </div>
        </div>

        <!-- Ranking resumido -->
        <div class="col-lg-4">
            <h5 class="fw-bold mb-3"><i class="bi bi-trophy"></i> Ranking</h5>
            <div class="card">
                <div class="table-responsive">
                    <table class="table table-sm mb-0">
                        <tbody>
                        <tr th:each="entry, stat : ${leaderboard}"
                            th:classappend="${entry.displayName == user.displayName} ? 'table-success fw-bold' : ''">
                            <td class="text-center" th:text="${stat.count}">1</td>
                            <td th:text="${entry.displayName}">Nome</td>
                            <td class="text-end fw-bold" th:text="${entry.totalPoints}">0</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="card-footer text-center">
                    <a th:href="@{/leaderboard}" class="btn btn-sm btn-outline-success">Ver ranking completo</a>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
