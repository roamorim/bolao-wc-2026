<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Esqueci minha senha')}"></head>
<body class="bg-light">

<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow-sm" style="width: 420px">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <div class="display-4">🔑</div>
                <h1 class="h4 fw-bold text-success">Esqueci minha senha</h1>
                <p class="text-muted small">Informe seu e-mail e enviaremos as instruções para redefinir sua senha.</p>
            </div>

            <form th:action="@{/esqueci-senha}" method="post">
                <div class="mb-4">
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" id="email" name="email"
                           class="form-control" placeholder="seu@email.com" required autofocus/>
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold">
                    <i class="bi bi-envelope"></i> Enviar instruções
                </button>
            </form>
        </div>
        <div class="card-footer text-center bg-transparent border-top-0 pb-3">
            <a th:href="@{/login}" class="text-muted small">
                <i class="bi bi-arrow-left"></i> Voltar ao login
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
