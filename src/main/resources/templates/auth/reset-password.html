<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Redefinir senha')}"></head>
<body class="bg-light">

<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow-sm" style="width: 420px">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <div class="display-4">🔐</div>
                <h1 class="h4 fw-bold text-success">Redefinir senha</h1>
            </div>

            <!-- Token inválido ou expirado -->
            <div th:if="${tokenError}" class="alert alert-danger">
                <i class="bi bi-exclamation-circle"></i>
                <span th:text="${tokenError}"></span>
                <div class="mt-2">
                    <a th:href="@{/esqueci-senha}" class="alert-link">Solicitar novo link</a>
                </div>
            </div>

            <!-- Formulário de redefinição -->
            <div th:if="${token}">
                <div th:if="${error}" class="alert alert-danger py-2">
                    <i class="bi bi-exclamation-circle"></i>
                    <span th:text="${error}"></span>
                </div>

                <form th:action="@{/redefinir-senha}" method="post">
                    <input type="hidden" name="token" th:value="${token}"/>
                    <div class="mb-3">
                        <label for="newPassword" class="form-label">Nova senha</label>
                        <input type="password" id="newPassword" name="newPassword"
                               class="form-control" placeholder="Mínimo 6 caracteres"
                               required minlength="6" autofocus/>
                    </div>
                    <div class="mb-4">
                        <label for="confirmPassword" class="form-label">Confirmar nova senha</label>
                        <input type="password" id="confirmPassword" name="confirmPassword"
                               class="form-control" placeholder="Repita a nova senha"
                               required minlength="6"/>
                    </div>
                    <button type="submit" class="btn btn-success w-100 fw-bold">
                        <i class="bi bi-shield-lock"></i> Redefinir senha
                    </button>
                </form>
            </div>
        </div>
        <div class="card-footer text-center bg-transparent border-top-0 pb-3">
            <a th:href="@{/login}" class="text-muted small">
                <i class="bi bi-arrow-left"></i> Voltar ao login
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
