<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Alterar Senha')}"></head>
<body class="bg-light">

<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow-sm" style="width: 420px">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <div class="display-4">🔐</div>
                <h1 class="h4 fw-bold text-success">Alterar Senha</h1>
                <p class="text-muted small">Defina uma nova senha para continuar.</p>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger py-2">
                <i class="bi bi-exclamation-circle"></i>
                <span th:text="${errorMessage}"></span>
            </div>
            <div th:if="${successMessage}" class="alert alert-success py-2">
                <i class="bi bi-check-circle"></i>
                <span th:text="${successMessage}"></span>
            </div>

            <form th:action="@{/alterar-senha}" method="post">
                <div class="mb-3">
                    <label for="currentPassword" class="form-label">Senha atual</label>
                    <input type="password" id="currentPassword" name="currentPassword"
                           class="form-control" placeholder="••••••••" required autofocus/>
                </div>
                <div class="mb-3">
                    <label for="newPassword" class="form-label">Nova senha</label>
                    <input type="password" id="newPassword" name="newPassword"
                           class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6"/>
                </div>
                <div class="mb-4">
                    <label for="confirmPassword" class="form-label">Confirmar nova senha</label>
                    <input type="password" id="confirmPassword" name="confirmPassword"
                           class="form-control" placeholder="Repita a nova senha" required minlength="6"/>
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold">
                    <i class="bi bi-shield-lock"></i> Alterar Senha
                </button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
