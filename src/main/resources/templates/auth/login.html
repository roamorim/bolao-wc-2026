<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body class="bg-light">

<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow-sm" style="width: 380px">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <div class="display-4">⚽</div>
                <h1 class="h4 fw-bold text-success">🏆 Bolão Copa 2026</h1>
                <p class="text-muted small" th:text="${subtitle}">Câmara dos Lordes</p>
            </div>

            <div th:if="${param.error}" class="alert alert-danger py-2">
                <i class="bi bi-exclamation-circle"></i> Usuário ou senha incorretos.
            </div>
            <div th:if="${param.logout}" class="alert alert-info py-2">
                <i class="bi bi-check-circle"></i> Você saiu com sucesso.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Usuário</label>
                    <input type="text" id="username" name="username"
                           class="form-control" placeholder="seu_usuario" required autofocus/>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Senha</label>
                    <input type="password" id="password" name="password"
                           class="form-control" placeholder="••••••••" required/>
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold">
                    <i class="bi bi-box-arrow-in-right"></i> Entrar
                </button>
            </form>
        </div>
        <div class="card-footer text-center bg-transparent border-top-0 pb-3 px-4">
            <p class="text-muted small mb-1">Ainda não tem acesso?</p>
            <p class="text-muted small mb-2">Transfira <strong th:text="${paymentAmount}">R$ 150</strong> para a chave/conta abaixo e avise:</p>
            <p class="font-monospace small text-secondary mb-2 user-select-all" th:text="${paymentKey}">c2297554-7770-4a72-8b6f-b5ee46d3473a</p>
            <a th:href="${contactUrl}" target="_blank" rel="noopener noreferrer"
               class="btn btn-outline-success btn-sm">
                <i class="bi bi-whatsapp"></i> <span th:text="${contactLabel}">Falar com o Rodrigo</span>
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
