<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Apostar')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container py-4" style="max-width: 600px">

    <a th:href="@{/matches}" class="btn btn-link ps-0 mb-3">
        <i class="bi bi-arrow-left"></i> Voltar aos jogos
    </a>

    <div class="card shadow-sm">
        <div class="card-header bg-success text-white">
            <small class="text-white-50" th:text="${match.stage.name}">Fase</small>
            <div class="fw-bold" th:text="${'Jogo ' + match.matchNumber}">Jogo 1</div>
        </div>
        <div class="card-body text-center py-4">
            <div class="d-flex justify-content-center align-items-center gap-4 mb-3">
                <div>
                    <div class="h5 fw-bold" th:text="${match.homeTeam?.name}">Casa</div>
                    <small class="text-muted" th:text="${match.homeTeam?.code}">COD</small>
                </div>
                <div class="text-muted h4">x</div>
                <div>
                    <div class="h5 fw-bold" th:text="${match.awayTeam?.name}">Fora</div>
                    <small class="text-muted" th:text="${match.awayTeam?.code}">COD</small>
                </div>
            </div>

            <p class="text-muted small">
                <i class="bi bi-clock"></i>
                <span th:text="${#temporals.format(match.matchDatetime, 'dd/MM/yyyy HH:mm')} + ' UTC'"></span>
                <br/>
                <i class="bi bi-geo-alt"></i>
                <span th:text="${match.venue}"></span>
            </p>

            <!-- Resultado oficial -->
            <div th:if="${match.finished}" class="alert alert-light border">
                <div class="text-muted small">Resultado oficial</div>
                <div class="display-6 fw-bold" th:text="${match.homeScore} + ' x ' + ${match.awayScore}">0 x 0</div>
                <div th:if="${existingPrediction?.pointsEarned != null}"
                     class="mt-2">
                    <span class="badge bg-success fs-6"
                          th:text="${existingPrediction.pointsEarned} + ' pontos'">0 pontos</span>
                </div>
            </div>

            <!-- Formulário de aposta -->
            <div th:unless="${match.finished}">
                <div th:if="${!match.open}" class="alert alert-warning">
                    <i class="bi bi-lock"></i> Apostas encerradas para este jogo.
                </div>

                <form th:if="${match.open}"
                      th:action="@{/matches/{id}/predict(id=${match.id})}"
                      method="post"
                      th:object="${predictionRequest}"
                      class="mt-3">

                    <div th:if="${existingPrediction != null}" class="alert alert-info py-2 text-start small">
                        <i class="bi bi-info-circle"></i>
                        Sua aposta atual:
                        <strong th:text="${existingPrediction.homeScorePred} + ' x ' + ${existingPrediction.awayScorePred}">0 x 0</strong>.
                        Você pode alterá-la até o prazo.
                    </div>

                    <div class="d-flex justify-content-center align-items-center gap-3 mb-4">
                        <div class="text-center">
                            <label class="form-label fw-semibold small" th:text="${match.homeTeam?.name}">Casa</label>
                            <input type="number" th:field="*{homeScore}"
                                   class="form-control form-control-lg text-center"
                                   style="width: 80px" min="0" max="20" required/>
                        </div>
                        <span class="h4 fw-bold mt-3">x</span>
                        <div class="text-center">
                            <label class="form-label fw-semibold small" th:text="${match.awayTeam?.name}">Fora</label>
                            <input type="number" th:field="*{awayScore}"
                                   class="form-control form-control-lg text-center"
                                   style="width: 80px" min="0" max="20" required/>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success btn-lg px-5">
                        <i class="bi bi-check-lg"></i>
                        <span th:text="${existingPrediction != null} ? 'Atualizar aposta' : 'Registrar aposta'">Apostar</span>
                    </button>

                    <p class="text-muted small mt-3">
                        Prazo:
                        <span th:text="${#temporals.format(match.predictionDeadline, 'dd/MM/yyyy HH:mm')} + ' UTC'"></span>
                    </p>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
