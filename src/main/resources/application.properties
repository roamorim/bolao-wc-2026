spring.application.name=bolao-wc-2026

# DataSource
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bolao}
spring.datasource.username=${DB_USERNAME:bolao}
spring.datasource.password=${DB_PASSWORD:bolao}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false

# Thymeleaf
spring.thymeleaf.cache=false

# Server
server.port=${PORT:8080}

# Session
server.servlet.session.timeout=8h

# Remember-me ("lembrar de mim")
bolao.security.remember-me-key=${REMEMBER_ME_KEY:dev-only-change-in-prod}
bolao.security.remember-me-validity-seconds=${REMEMBER_ME_VALIDITY_SECONDS:2592000}

# Timezone
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Email (Gmail SMTP) — defina GMAIL_USER e GMAIL_APP_PASSWORD no .env
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
mail.enabled=${MAIL_ENABLED:false}

# Login page customization
bolao.subtitle=${BOLAO_SUBTITLE:Câmara dos Lordes}
bolao.payment.amount=${BOLAO_PAYMENT_AMOUNT:R$ 150}
bolao.payment.key=${BOLAO_PAYMENT_KEY:c2297554-7770-4a72-8b6f-b5ee46d3473a}
bolao.contact.url=${BOLAO_CONTACT_URL:https://wa.me/56963891924}
bolao.contact.label=${BOLAO_CONTACT_LABEL:Falar com o Rodrigo}
bolao.payment.amount.value=${BOLAO_PAYMENT_AMOUNT_VALUE:150}
bolao.currency.symbol=${BOLAO_CURRENCY_SYMBOL:R$}
bolao.hosting.cost=${BOLAO_HOSTING_COST:50}
bolao.fingerprint.enabled=${BOLAO_FINGERPRINT_ENABLED:false}
bolao.base-url=${BOLAO_BASE_URL:http://localhost:8080}

# football-data.org API (https://www.football-data.org)
football-data.api.base-url=https://api.football-data.org/v4
football-data.api.key=${FOOTBALL_DATA_API_KEY:}
football-data.competition=WC
football-data.match-end-offset-minutes=110
