spring.application.name=bolao-wc-2026

# DataSource
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bolao}
spring.datasource.username=${DB_USERNAME:bolao}
spring.datasource.password=${DB_PASSWORD:bolao}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false

# Thymeleaf
spring.thymeleaf.cache=false

# Server
server.port=${PORT:8080}

# Session
spring.session.timeout=8h

# Timezone
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
